sentence=Play generated voice clips and Vietnamese number speech on Arduino, ESP8266, and ESP32.
paragraph=VN_VOICE plays 8-bit PCM audio arrays from a user-generated audio_data.h file, supports queued playback, volume control, Vietnamese number reading, decimal numbers, and digit strings. Arduino Uno and Nano can play short custom clips, while the built-in SO_DEM number voice data requires Arduino Mega, ESP8266, ESP32, or a larger board.
